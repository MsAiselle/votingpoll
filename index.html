<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Vote - Pastel</title>
    <style>
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; background: #FFF0F0; display: flex; justify-content: center; padding: 20px; color: #555; }
        .card { background: white; padding: 30px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .btn { padding: 25px 10px; border: 2px solid #FFE4E1; border-radius: 15px; background: white; cursor: pointer; font-weight: bold; color: #777; transition: 0.3s; font-size: 16px; }
        .selected { background: #FFB7B2; color: white; border-color: #FFB7B2; box-shadow: 0 5px 15px rgba(255,183,178,0.4); }
        input { padding: 15px; width: 85%; margin-bottom: 15px; border-radius: 12px; border: 1px solid #FFE4E1; font-size: 18px; text-align: center; }
        #sub { width: 100%; padding: 18px; background: #B2e2f2; color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; display: none; font-size: 18px; }
        #toast { visibility: hidden; min-width: 250px; background: #555; color: #fff; text-align: center; border-radius: 10px; padding: 16px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 99; }
        .show { visibility: visible !important; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>
    <div class="card">
        <div id="loginSection">
            <h2 style="color: #FFB7B2;">您好! Welcome</h2>
            <p>Enter Student Number and Name<br><small>(Ex: 10 許晉豪)</small></p>
            <input type="text" id="sName" placeholder="座號 姓名">
            <button id="startBtn" onclick="checkName()" style="padding:12px 30px; background:#FFB7B2; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer; width:100%;">Start Voting</button>
        </div>

        <div id="voteSection" style="display:none">
            <p>Please pick <b>2</b> groups:</p>
            <div class="grid">
                <button class="btn" id="g1" onclick="sel(1)">Group 1</button>
                <button class="btn" id="g2" onclick="sel(2)">Group 2</button>
                <button class="btn" id="g3" onclick="sel(3)">Group 3</button>
                <button class="btn" id="g4" onclick="sel(4)">Group 4</button>
            </div>
            <button id="sub" onclick="cast()">Submit My Votes</button>
        </div>
    </div>
    <div id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, set, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // PASTE YOUR CONFIG HERE
         const firebaseConfig = {
  apiKey: "AIzaSyC8CX0_ZsTf5YVbDi_y6tO_vh8JL7aepW8",
  authDomain: "classvote-9fde8.firebaseapp.com",
  projectId: "classvote-9fde8",
  storageBucket: "classvote-9fde8.firebasestorage.app",
  messagingSenderId: "592462827187",
  appId: "1:592462827187:web:306d4205364cd5c5496ac6"
};

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let selected = [];
        let officialName = "";

        function showToast(msg) {
            const x = document.getElementById("toast"); 
            x.innerText = msg; x.classList.add("show");
            setTimeout(() => { x.classList.remove("show"); }, 3000);
        }

        function clean(str) { return str.replace(/[\s\u3000]/g, '').toLowerCase(); }
        function firebaseSafe(str) { return str.replace(/[\s\u3000\.\#\$\/\[\]]/g, '_'); }

        window.checkName = async () => {
            const btn = document.getElementById('startBtn');
            const inputVal = document.getElementById('sName').value;
            if(!inputVal) return showToast("Please enter your name!");
            btn.innerText = "Checking..."; btn.disabled = true;

            try {
                const snap = await get(ref(db, 'allowedStudents'));
                const allowed = snap.val() || [];
                const match = allowed.find(n => clean(n) === clean(inputVal));
                
                if (!match) {
                    showToast("Name not found! 找不到姓名");
                    btn.innerText = "Start Voting"; btn.disabled = false;
                    return;
                }

                const votedSnap = await get(ref(db, 'voted/' + firebaseSafe(match)));
                if (votedSnap.exists()) {
                    showToast("Already voted! 您已投票過");
                    btn.innerText = "Start Voting"; btn.disabled = false;
                } else { 
                    officialName = match;
                    document.getElementById('loginSection').style.display = 'none';
                    document.getElementById('voteSection').style.display = 'block';
                }
            } catch (error) {
                showToast("Connection Error!");
                btn.innerText = "Start Voting"; btn.disabled = false;
            }
        };

        window.sel = (n) => {
            if(selected.includes(n)) { selected = selected.filter(x => x !== n); } 
            else {
                if(selected.length === 2) selected.shift();
                selected.push(n);
            }
            for(let i=1; i<=4; i++) {
                const b = document.getElementById('g' + i);
                selected.includes(i) ? b.classList.add('selected') : b.classList.remove('selected');
            }
            document.getElementById('sub').style.display = (selected.length === 2) ? 'block' : 'none';
        };

        window.cast = async () => {
            const subBtn = document.getElementById('sub');
            subBtn.disabled = true;
            try {
                await push(ref(db, 'votes'), { name: officialName, choices: selected });
                await set(ref(db, 'voted/' + firebaseSafe(officialName)), true);
                showToast("Success! Redirecting...");
                setTimeout(() => location.reload(), 2000);
            } catch (e) {
                showToast("Error saving vote.");
                subBtn.disabled = false;
            }
        };
    </script>
</body>
</html>
