<!DOCTYPE html>
<html>
<head>
    <title>Teacher Panel - Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f8f9fa; display: flex; flex-direction: column; align-items: center; }
        .dashboard { display: flex; gap: 30px; width: 100%; max-width: 1000px; }
        .section { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); flex: 1; }
        .chart { display: flex; align-items: flex-end; justify-content: center; height: 350px; gap: 20px; margin: 20px 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .bar { width: 70px; background: #2196F3; border-radius: 8px 8px 0 0; transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; opacity: 1; }
        .bar span { position: absolute; top: -30px; width: 100%; text-align: center; font-weight: bold; font-size: 14px; }
        
        /* Winner & Tie Styles */
        .winning-bar { background: #4CAF50 !important; width: 100px !important; box-shadow: 0 0 30px rgba(76, 175, 80, 0.5); transform: scale(1.1); }
        .fade-out { opacity: 0.3; filter: grayscale(50%); }

        .student-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; }
        .voted { color: #4CAF50; font-weight: bold; }
        .delete-btn { color: #ff4444; cursor: pointer; border: none; background: none; font-weight: bold; }
        button { padding: 12px; cursor: pointer; border-radius: 8px; border: none; background: #2196F3; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Teacher Control Center</h1>
    <div class="dashboard">
        <div class="section">
            <h3>Live Results</h3>
            <div class="chart" id="chartArea">
                <div id="bar1" class="bar" style="height: 10px;"><span>G1: 0</span></div>
                <div id="bar2" class="bar" style="height: 10px;"><span>G2: 0</span></div>
                <div id="bar3" class="bar" style="height: 10px;"><span>G3: 0</span></div>
                <div id="bar4" class="bar" style="height: 10px;"><span>G4: 0</span></div>
            </div>
            <button onclick="revealWinner()" style="background: #4CAF50; width: 100%; font-size: 18px;">🏆 Finalize & Show Winner</button>
            <button onclick="clearAll()" style="background: none; color: red; width: 100%; margin-top: 10px;">Reset All</button>
        </div>
        <div class="section">
            <h3>Roster (<span id="count">0</span> Voted)</h3>
            <input type="text" id="newStudent" placeholder="Student Name" style="padding:10px; width:60%">
            <button onclick="addOneStudent()">Add</button>
            <div id="rosterList" style="margin-top:15px"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

         const firebaseConfig = {
  apiKey: "AIzaSyC8CX0_ZsTf5YVbDi_y6tO_vh8JL7aepW8",
  authDomain: "classvote-9fde8.firebaseapp.com",
  projectId: "classvote-9fde8",
  storageBucket: "classvote-9fde8.firebasestorage.app",
  messagingSenderId: "592462827187",
  appId: "1:592462827187:web:306d4205364cd5c5496ac6"
};

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let counts = { 1: 0, 2: 0, 3: 0, 4: 0 };
        let allowed = [];
        let votes = {};

        onValue(ref(db, '/'), (snap) => {
            const data = snap.val() || {};
            allowed = data.allowedStudents || [];
            votes = data.votes || {};
            updateUI();
        });

        function updateUI() {
            counts = { 1: 0, 2: 0, 3: 0, 4: 0 };
            Object.values(votes).forEach(v => v.choices.forEach(c => counts[c]++));
            for(let i=1; i<=4; i++) {
                const b = document.getElementById('bar' + i);
                b.style.height = (10 + (counts[i] * 40)) + "px";
                b.querySelector('span').innerText = `G${i}: ${counts[i]}`;
            }
            const list = document.getElementById('rosterList');
            list.innerHTML = "";
            let vCount = 0;
            allowed.forEach(n => {
                const v = Object.values(votes).some(v => v.name === n);
                if(v) vCount++;
                list.innerHTML += `<div class="student-item"><span class="${v?'voted':''}">${n} ${v?'✓':''}</span><button class="delete-btn" onclick="removeStudent('${n}')">✕</button></div>`;
            });
            document.getElementById('count').innerText = vCount;
        }

        window.revealWinner = () => {
            let max = Math.max(...Object.values(counts));
            if(max === 0) return alert("No votes yet!");
            let winners = [];
            for(let i=1; i<=4; i++) {
                const b = document.getElementById('bar'+i);
                if(counts[i] === max) {
                    b.classList.add('winning-bar');
                    b.classList.remove('fade-out');
                    winners.push("Group " + i);
                } else {
                    b.classList.add('fade-out');
                    b.classList.remove('winning-bar');
                }
            }
            setTimeout(() => alert(winners.length > 1 ? "🤝 TIE! " + winners.join(" & ") : "🎉 WINNER: " + winners[0]), 200);
        };

        window.addOneStudent = () => {
            const i = document.getElementById('newStudent');
            if(i.value && !allowed.includes(i.value)) {
                allowed.push(i.value);
                set(ref(db, 'allowedStudents'), allowed);
                i.value = "";
            }
        };

        window.removeStudent = (n) => {
            if(!confirm(`Delete ${n}?`)) return;
            set(ref(db, 'allowedStudents'), allowed.filter(x => x !== n));
            Object.keys(votes).forEach(k => { if(votes[k].name === n) remove(ref(db, 'votes/'+k)); });
            remove(ref(db, 'voted/' + n.replace(/\./g, '_')));
        };

        window.clearAll = () => { if(confirm("Reset all?")) remove(ref(db, '/')); };
    </script>
</body>
</html>
