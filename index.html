<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Vote - Pastel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #FFF0F0; display: flex; justify-content: center; padding: 20px; color: #555; }
        .card { background: white; padding: 30px; border-radius: 25px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin: 25px 0; }
        .btn { padding: 25px 10px; border: 2px solid #FFE4E1; border-radius: 15px; background: white; cursor: pointer; font-weight: bold; color: #777; transition: 0.3s; }
        .selected { background: #FFB7B2; color: white; border-color: #FFB7B2; box-shadow: 0 5px 15px rgba(255,183,178,0.4); }
        input { padding: 15px; width: 85%; margin-bottom: 15px; border-radius: 12px; border: 1px solid #FFE4E1; font-size: 16px; }
        #sub { width: 100%; padding: 18px; background: #B2e2f2; color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; display: none; }
        #toast { visibility: hidden; min-width: 250px; background: #555; color: #fff; text-align: center; border-radius: 10px; padding: 16px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); }
        .show { visibility: visible !important; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>
    <div class="card">
        <div id="loginSection">
            <h2 style="color: #FFB7B2;">Welcome!</h2>
            <p>Enter Student Number and Name</p>
            <input type="text" id="sName" placeholder="e.g. 101 John Doe">
            <button onclick="checkName()" style="padding:12px 30px; background:#FFB7B2; color:white; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">Start Voting</button>
        </div>

        <div id="voteSection" style="display:none">
            <p>Pick <b>exactly 2</b> groups:</p>
            <div class="grid">
                <button class="btn" onclick="sel(1)">Group 1</button>
                <button class="btn" onclick="sel(2)">Group 2</button>
                <button class="btn" onclick="sel(3)">Group 3</button>
                <button class="btn" onclick="sel(4)">Group 4</button>
            </div>
            <button id="sub" onclick="cast()">Submit My Votes</button>
        </div>
    </div>
    <div id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, set, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { /* PASTE YOUR CONFIG HERE */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let selected = [];
        let name = "";

        function showToast(msg) {
            const x = document.getElementById("toast"); x.innerText = msg; x.className = "show";
            setTimeout(() => { x.className = ""; }, 3000);
        }

        window.checkName = async () => {
            name = document.getElementById('sName').value.trim();
            const snap = await get(ref(db, 'allowedStudents'));
            const allowed = snap.val() || [];
            const votedSnap = await get(ref(db, 'voted/' + name.replace(/\./g, '_')));

            if (!allowed.includes(name)) { showToast("Student info not recognized!"); }
            else if (votedSnap.exists()) { showToast("You have already voted!"); }
            else { 
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('voteSection').style.display = 'block';
            }
        };

        window.sel = (n) => {
            const btns = document.querySelectorAll('.btn');
            if(selected.includes(n)) {
                selected = selected.filter(x => x !== n);
                btns[n-1].classList.remove('selected');
            } else if(selected.length < 2) {
                selected.push(n);
                btns[n-1].classList.add('selected');
            }
            document.getElementById('sub').style.display = (selected.length === 2) ? 'block' : 'none';
        };

        window.cast = async () => {
            await push(ref(db, 'votes'), { name: name, choices: selected });
            await set(ref(db, 'voted/' + name.replace(/\./g, '_')), true);
            showToast("Success! Redirecting...");
            setTimeout(() => location.reload(), 2000);
        };
    </script>
</body>
</html>
