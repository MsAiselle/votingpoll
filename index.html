<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Vote</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .group-btn { padding: 20px; border: 2px solid #e0e0e0; border-radius: 10px; background: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .group-btn.selected { background: #4CAF50; color: white; border-color: #388E3C; }
        button#submit { width: 100%; padding: 15px; background: #2196F3; color: white; border: none; border-radius: 8px; margin-top: 20px; font-size: 18px; cursor: pointer; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2 id="status">Enter Your Name</h2>
        <input type="text" id="studentName" placeholder="Full Name">
        <button onclick="verifyStudent()" id="loginBtn" style="padding: 10px 20px;">Check Name</button>

        <div id="votingArea" style="display:none;">
            <p>Select <b>exactly 2</b> different groups:</p>
            <div class="grid">
                <button class="group-btn" onclick="selectGroup(1)">Group 1</button>
                <button class="group-btn" onclick="selectGroup(2)">Group 2</button>
                <button class="group-btn" onclick="selectGroup(3)">Group 3</button>
                <button class="group-btn" onclick="selectGroup(4)">Group 4</button>
            </div>
            <button id="submit" onclick="castVote()">Submit Votes</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, set, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // PASTE YOUR FIREBASE CONFIG HERE
        const firebaseConfig = { PASTE_YOUR_CONFIG_HERE };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let selected = [];
        let currentName = "";

        window.verifyStudent = async () => {
            currentName = document.getElementById('studentName').value.trim();
            const snapshot = await get(ref(db, 'allowedStudents'));
            const allowed = snapshot.val() || [];
            const votedSnap = await get(ref(db, 'voted/' + currentName.replace(/\./g, '_')));

            if (!allowed.includes(currentName)) {
                alert("Name not on the list!");
            } else if (votedSnap.exists()) {
                alert("You already voted!");
            } else {
                document.getElementById('votingArea').style.display = 'block';
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('studentName').disabled = true;
            }
        };

        window.selectGroup = (num) => {
            const btns = document.getElementsByClassName('group-btn');
            if (selected.includes(num)) {
                selected = selected.filter(n => n !== num);
                btns[num-1].classList.remove('selected');
            } else if (selected.length < 2) {
                selected.push(num);
                btns[num-1].classList.add('selected');
            }
            document.getElementById('submit').style.display = selected.length === 2 ? 'block' : 'none';
        };

        window.castVote = async () => {
            const voteRef = ref(db, 'votes');
            await push(voteRef, { name: currentName, choices: selected });
            await set(ref(db, 'voted/' + currentName.replace(/\./g, '_')), true);
            alert("Success! Thank you.");
            location.reload();
        };
    </script>
</body>
</html>
