<!DOCTYPE html>
<html>
<head>
    <title>Teacher Panel - Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #f8f9fa; display: flex; flex-direction: column; align-items: center; }
        .dashboard { display: flex; gap: 30px; width: 100%; max-width: 1000px; }
        .section { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); flex: 1; }
        .chart { display: flex; align-items: flex-end; justify-content: center; height: 250px; gap: 15px; margin: 20px 0; border-bottom: 2px solid #eee; }
        .bar { width: 50px; background: #2196F3; border-radius: 5px 5px 0 0; transition: 0.5s all; position: relative; }
        .bar span { position: absolute; top: -25px; width: 100%; text-align: center; font-size: 12px; font-weight: bold; }
        .winner { background: #FFD700 !important; box-shadow: 0 0 15px gold; }
        .student-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #eee; font-size: 14px; }
        .voted { color: #4CAF50; font-weight: bold; }
        .not-voted { color: #999; font-style: italic; }
        .delete-btn { color: #ff4444; cursor: pointer; border: none; background: none; font-weight: bold; }
        input { padding: 10px; width: 70%; border: 1px solid #ddd; border-radius: 5px; }
        button { padding: 10px 15px; cursor: pointer; border-radius: 5px; border: none; background: #2196F3; color: white; }
    </style>
</head>
<body>
    <h1>Teacher Control Panel</h1>
    
    <div class="dashboard">
        <div class="section">
            <h3>Live Results</h3>
            <div class="chart">
                <div id="bar1" class="bar" style="height: 10px;"><span>G1: 0</span></div>
                <div id="bar2" class="bar" style="height: 10px;"><span>G2: 0</span></div>
                <div id="bar3" class="bar" style="height: 10px;"><span>G3: 0</span></div>
                <div id="bar4" class="bar" style="height: 10px;"><span>G4: 0</span></div>
            </div>
            <button onclick="revealWinner()" style="background: #4CAF50; width: 100%;">Finalize & Show Winner</button>
            <button onclick="clearAll()" style="background: none; color: red; width: 100%; margin-top: 10px;">Reset All Data</button>
        </div>

        <div class="section">
            <h3>Student Roster</h3>
            <div style="margin-bottom: 15px;">
                <input type="text" id="newStudent" placeholder="Student Name">
                <button onclick="addOneStudent()">Add</button>
            </div>
            <div id="rosterList">
                </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // --- PASTE YOUR FIREBASE CONFIG BELOW ---
         const firebaseConfig = {
  apiKey: "AIzaSyC8CX0_ZsTf5YVbDi_y6tO_vh8JL7aepW8",
  authDomain: "classvote-9fde8.firebaseapp.com",
  projectId: "classvote-9fde8",
  storageBucket: "classvote-9fde8.firebasestorage.app",
  messagingSenderId: "592462827187",
  appId: "1:592462827187:web:306d4205364cd5c5496ac6"
};
        // ----------------------------------------

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let currentVotes = {};
        let allowedStudents = [];

        // 1. LISTEN FOR CHANGES (REAL-TIME)
        onValue(ref(db, '/'), (snapshot) => {
            const data = snapshot.val() || {};
            allowedStudents = data.allowedStudents || [];
            currentVotes = data.votes || {};
            updateUI();
        });

        function updateUI() {
            // Update Bars
            let counts = { 1: 0, 2: 0, 3: 0, 4: 0 };
            Object.values(currentVotes).forEach(v => {
                v.choices.forEach(c => counts[c]++);
            });

            for(let i=1; i<=4; i++) {
                const bar = document.getElementById('bar' + i);
                bar.style.height = (10 + (counts[i] * 30)) + "px";
                bar.querySelector('span').innerText = `G${i}: ${counts[i]}`;
            }

            // Update Roster
            const listDiv = document.getElementById('rosterList');
            listDiv.innerHTML = "";
            
            allowedStudents.forEach(name => {
                const hasVoted = Object.values(currentVotes).some(v => v.name === name);
                const item = document.createElement('div');
                item.className = 'student-item';
                item.innerHTML = `
                    <span class="${hasVoted ? 'voted' : 'not-voted'}">${name} ${hasVoted ? '✓' : '(Waiting...)'}</span>
                    <button class="delete-btn" onclick="removeStudent('${name}')">✕</button>
                `;
                listDiv.appendChild(item);
            });
        }

        // 2. ADD STUDENT (Real-time)
        window.addOneStudent = () => {
            const input = document.getElementById('newStudent');
            const name = input.value.trim();
            if(name && !allowedStudents.includes(name)) {
                allowedStudents.push(name);
                set(ref(db, 'allowedStudents'), allowedStudents);
                input.value = "";
            }
        };

        // 3. REMOVE STUDENT & DEDUCT VOTE
        window.removeStudent = async (name) => {
            if(!confirm(`Remove ${name}? This will also delete their votes.`)) return;

            // Remove from allowed list
            const newList = allowedStudents.filter(n => n !== name);
            await set(ref(db, 'allowedStudents'), newList);

            // Find and delete their vote from the 'votes' list
            Object.keys(currentVotes).forEach(voteID => {
                if(currentVotes[voteID].name === name) {
                    remove(ref(db, 'votes/' + voteID));
                }
            });

            // Remove from the 'already voted' lock list
            remove(ref(db, 'voted/' + name.replace(/\./g, '_')));
        };

        window.revealWinner = () => {
            // Finding max logic...
            alert("Winner revealed!");
        };

        window.clearAll = () => { if(confirm("Clear ALL?")) remove(ref(db, '/')); };
    </script>
</body>
</html>
