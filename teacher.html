<!DOCTYPE html>
<html>
<head>
    <title>Teacher Panel - Class Manager</title>
    <style>
        body { font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif; padding: 20px; background: #F0F4FF; color: #444; display: flex; flex-direction: column; align-items: center; }
        .container { display: flex; gap: 20px; width: 100%; max-width: 1250px; align-items: flex-start; }
        .section { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); min-height: 600px; }
        
        /* Left: Class Manager */
        .manager { width: 320px; }
        .class-card { background: #f9f9f9; padding: 12px; margin-top: 10px; border-radius: 12px; border: 1px solid #e0e0e0; }
        .active-tag { background: #77DD77; color: white; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-left: 5px; vertical-align: middle; }

        /* Middle: Live Results */
        .results { flex: 2; text-align: center; display: flex; flex-direction: column; justify-content: space-between; }
        .chart { display: flex; align-items: flex-end; justify-content: space-around; height: 320px; margin: 40px 0 20px 0; border-bottom: 2px solid #eee; padding: 0 10px; }
        .bar-container { display: flex; flex-direction: column; align-items: center; width: 20%; }
        .bar { width: 100%; background: #AEC6CF; border-radius: 8px 8px 0 0; transition: 0.5s all; position: relative; min-height: 10px; }
        .bar-label { font-weight: bold; margin-bottom: 10px; font-size: 14px; color: #666; }
        .winning-bar { background: #77DD77 !important; transform: scale(1.05); box-shadow: 0 0 20px rgba(119,221,119,0.4); }
        .fade-out { opacity: 0.3; }

        /* Right: Active Roster */
        .roster { width: 320px; }
        .student-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #f0f0f0; font-size: 13px; }
        .voted { color: #77DD77; font-weight: bold; }
        .waiting { color: #B0B0B0; font-style: italic; }
        
        button { cursor: pointer; border-radius: 8px; border: none; font-weight: bold; transition: 0.2s; }
        .btn-blue { background: #779ECB; color: white; padding: 12px; width: 100%; }
        .btn-green { background: #77DD77; color: white; padding: 6px 10px; font-size: 11px; }
        .btn-edit { background: #FDFD96; color: #666; padding: 6px 10px; font-size: 11px; }
        .btn-red { background: none; color: #FF6961; font-size: 11px; cursor: pointer; border: 1px solid transparent; }
        .btn-red:hover { border-color: #FF6961; border-radius: 4px; }
        textarea, input { width: 92%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; }
    </style>
</head>
<body>
    <h1 style="color: #779ECB; margin-bottom: 30px;">Classroom Poll Manager</h1>
    
    <div class="container">
        <div class="section manager">
            <h3>Class Library</h3>
            <input type="text" id="className" placeholder="Class Name (e.g. 802)">
            <textarea id="classList" rows="5" placeholder="Names: 10 張嘉業, 11 翁翊凱... (separate by comma)"></textarea>
            <button class="btn-blue" id="saveBtn" onclick="saveClass()">Save to Library</button>
            <div id="libraryItems"></div>
        </div>

        <div class="section results">
            <div>
                <h2 id="activeTitle" style="margin: 0; color: #779ECB;">No Active Class</h2>
                <div class="chart">
                    <div class="bar-container"><div id="v1" class="bar-label">0</div><div id="bar1" class="bar"></div><div class="bar-label" style="margin-top:10px">G1</div></div>
                    <div class="bar-container"><div id="v2" class="bar-label">0</div><div id="bar2" class="bar"></div><div class="bar-label" style="margin-top:10px">G2</div></div>
                    <div class="bar-container"><div id="v3" class="bar-label">0</div><div id="bar3" class="bar"></div><div class="bar-label" style="margin-top:10px">G3</div></div>
                    <div class="bar-container"><div id="v4" class="bar-label">0</div><div id="bar4" class="bar"></div><div class="bar-label" style="margin-top:10px">G4</div></div>
                </div>
            </div>
            <div>
                <button id="main-btn" class="btn-blue" style="background:#77DD77; padding:15px; font-size: 18px;" onclick="revealWinner()">🏆 Show Winner</button>
                <button class="btn-red" style="margin-top:20px" onclick="resetCurrentVotes()">Clear Current Votes Only</button>
            </div>
        </div>

        <div class="section roster">
            <h3>Student Roster (<span id="vCount">0</span> Voted)</h3>
            <div id="rosterItems" style="max-height: 600px; overflow-y: auto;"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, set, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // PASTE YOUR CONFIG HERE
        const firebaseConfig = {
  apiKey: "AIzaSyC8CX0_ZsTf5YVbDi_y6tO_vh8JL7aepW8",
  authDomain: "classvote-9fde8.firebaseapp.com",
  projectId: "classvote-9fde8",
  storageBucket: "classvote-9fde8.firebasestorage.app",
  messagingSenderId: "592462827187",
  appId: "1:592462827187:web:306d4205364cd5c5496ac6"
};
        
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let library = {};
        let activeClass = "";
        let allowed = [];
        let votes = {};

        onValue(ref(db, '/'), (snap) => {
            const data = snap.val() || {};
            library = data.classLibrary || {};
            activeClass = data.activeClassName || "";
            allowed = data.allowedStudents || [];
            votes = data.votes || {};
            updateUI();
        });

        function updateUI() {
            const libDiv = document.getElementById('libraryItems');
            libDiv.innerHTML = "";
            Object.keys(library).forEach(name => {
                const isActive = (name === activeClass);
                libDiv.innerHTML += `
                    <div class="class-card">
                        <b>${name}</b> ${isActive ? '<span class="active-tag">ACTIVE</span>' : ''}<br>
                        <div style="margin-top:8px; display:flex; gap:5px;">
                            <button class="btn-green" onclick="uploadClass('${name}')">Upload</button>
                            <button class="btn-edit" onclick="editLibraryClass('${name}')">Edit</button>
                            <button class="btn-red" style="margin-left:auto" onclick="deleteFromLibrary('${name}')">Delete</button>
                        </div>
                    </div>`;
            });

            let counts = {1:0, 2:0, 3:0, 4:0};
            Object.values(votes).forEach(v => v.choices.forEach(c => counts[c]++));
            for(let i=1; i<=4; i++){
                const b = document.getElementById('bar'+i);
                const v = document.getElementById('v'+i);
                b.style.height = (counts[i] * 25) + "px";
                v.innerText = counts[i];
            }

            document.getElementById('activeTitle').innerText = activeClass ? "Active: " + activeClass : "Select a Class";
            const rosDiv = document.getElementById('rosterItems');
            rosDiv.innerHTML = "";
            let vTotal = 0;
            allowed.forEach(n => {
                const hasVoted = Object.values(votes).some(v => v.name === n);
                if(hasVoted) vTotal++;
                rosDiv.innerHTML += `
                    <div class="student-item">
                        <span class="${hasVoted?'voted':'waiting'}">${n} ${hasVoted?'Voted ✓':'Waiting...'}</span>
                        <button class="btn-red" onclick="removeSingleStudent('${n}')">Delete Student</button>
                    </div>`;
            });
            document.getElementById('vCount').innerText = vTotal;
        }

        window.saveClass = () => {
            const name = document.getElementById('className').value.trim();
            const listStr = document.getElementById('classList').value;
            if(!name || !listStr) return alert("Fill all fields!");
            const list = listStr.split(',').map(n => n.trim()).filter(n => n !== "");
            
            set(ref(db, 'classLibrary/' + name), list);
            if(name === activeClass) set(ref(db, 'allowedStudents'), list);

            document.getElementById('className').value = "";
            document.getElementById('classList').value = "";
            document.getElementById('saveBtn').innerText = "Save to Library";
        };

        window.editLibraryClass = (name) => {
            document.getElementById('className').value = name;
            document.getElementById('classList').value = library[name].join(', ');
            document.getElementById('saveBtn').innerText = "Update Class";
            window.scrollTo(0,0);
        };

        window.uploadClass = (name) => {
            if(!confirm(`Upload ${name}? This clears current votes!`)) return;
            set(ref(db, 'allowedStudents'), library[name]);
            set(ref(db, 'activeClassName'), name);
            remove(ref(db, 'votes'));
            remove(ref(db, 'voted'));
        };

        window.removeSingleStudent = (n) => {
            if(!confirm(`Delete ${n}?`)) return;
            const newList = allowed.filter(x => x !== n);
            set(ref(db, 'allowedStudents'), newList);
            if(activeClass) set(ref(db, 'classLibrary/' + activeClass), newList);
        };

        window.deleteFromLibrary = (name) => {
            if(confirm(`Delete ${name}?`)) remove(ref(db, 'classLibrary/' + name));
        };

        window.resetCurrentVotes = () => {
            if(confirm("Wipe current votes?")) { remove(ref(db, 'votes')); remove(ref(db, 'voted')); }
        };

        window.revealWinner = () => {
            let counts = {1:0, 2:0, 3:0, 4:0};
            Object.values(votes).forEach(v => v.choices.forEach(c => counts[c]++));
            let max = Math.max(...Object.values(counts));
            if(max === 0) return alert("No votes!");
            for(let i=1; i<=4; i++){
                const b = document.getElementById('bar'+i);
                if(counts[i] === max) { b.classList.add('winning-bar'); b.classList.remove('fade-out'); }
                else { b.classList.add('fade-out'); b.classList.remove('winning-bar'); }
            }
        };
    </script>
</body>
</html>
