<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Vote</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .btn { padding: 20px; border: 2px solid #ddd; border-radius: 10px; background: white; cursor: pointer; font-weight: bold; }
        .selected { background: #4CAF50; color: white; border-color: #388E3C; }
        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 5px; padding: 16px; position: fixed; z-index: 1; bottom: 30px; font-size: 17px; }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>
    <div class="card">
        <div id="loginSection">
            <h2>Enter Name</h2>
            <input type="text" id="sName" style="padding:12px; width:80%; margin-bottom:10px; border-radius:5px; border:1px solid #ccc">
            <button onclick="checkName()" style="padding:10px 20px; background:#2196F3; color:white; border:none; border-radius:5px">Login</button>
        </div>

        <div id="voteSection" style="display:none">
            <p>Pick **exactly 2** groups:</p>
            <div class="grid">
                <button class="btn" onclick="sel(1)">Group 1</button>
                <button class="btn" onclick="sel(2)">Group 2</button>
                <button class="btn" onclick="sel(3)">Group 3</button>
                <button class="btn" onclick="sel(4)">Group 4</button>
            </div>
            <button id="sub" onclick="cast()" style="display:none; width:100%; padding:15px; background:#4CAF50; color:white; border:none; border-radius:8px">Submit Vote</button>
        </div>
    </div>
    <div id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, get, set, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = { /* PASTE YOUR CONFIG HERE */ };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let selected = [];
        let name = "";

        function showToast(msg) {
            const x = document.getElementById("toast");
            x.innerText = msg;
            x.className = "show";
            setTimeout(() => { x.className = x.className.replace("show", ""); }, 3000);
        }

        window.checkName = async () => {
            name = document.getElementById('sName').value.trim();
            const snap = await get(ref(db, 'allowedStudents'));
            const allowed = snap.val() || [];
            const votedSnap = await get(ref(db, 'voted/' + name.replace(/\./g, '_')));

            if (!allowed.includes(name)) {
                showToast("Name not found on roster!");
            } else if (votedSnap.exists()) {
                showToast("You have already voted!");
            } else {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('voteSection').style.display = 'block';
            }
        };

        window.sel = (n) => {
            const btns = document.querySelectorAll('.btn');
            if(selected.includes(n)) {
                selected = selected.filter(x => x !== n);
                btns[n-1].classList.remove('selected');
            } else if(selected.length < 2) {
                selected.push(n);
                btns[n-1].classList.add('selected');
            }
            document.getElementById('sub').style.display = selected.length === 2 ? 'block' : 'none';
        };

        window.cast = async () => {
            await push(ref(db, 'votes'), { name: name, choices: selected });
            await set(ref(db, 'voted/' + name.replace(/\./g, '_')), true);
            showToast("Success! Vote recorded.");
            setTimeout(() => location.reload(), 2000);
        };
    </script>
</body>
</html>
